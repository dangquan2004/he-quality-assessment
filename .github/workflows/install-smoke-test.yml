name: Install Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenslide-dev openslide-tools libvips-tools

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Verify clone-layout script entrypoint
        run: python scripts/he_quality.py --help

      - name: Install package from repository
        run: python -m pip install .

      - name: Verify installed CLI entrypoint
        run: |
          he-quality --help
          python scripts/he_quality.py infer-hybrid-wsi --help

      - name: Run lightweight unit tests
        run: python -m unittest discover -s tests
